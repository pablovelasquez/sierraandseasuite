name: Deploy Website to AWS

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "infrastructure/cloudfront/**"
      - "scripts/generate_sitemap_and_redirects.mjs"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: sierraseasuite.com
  CLOUDFRONT_DISTRIBUTION_ID: E34R8IP5SI7083

concurrency:
  group: deploy-website-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          missing=0
          for key in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Add them in GitHub repo settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate sitemap and SEO route artifacts
        run: |
          node scripts/generate_sitemap_and_redirects.mjs

      - name: Publish CloudFront viewer-request function
        env:
          DISTRIBUTION_ID: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail

          if ! FUNCTION_ARN="$(aws cloudfront get-distribution-config \
            --id "${DISTRIBUTION_ID}" \
            --query "DistributionConfig.DefaultCacheBehavior.FunctionAssociations.Items[?EventType=='viewer-request'].FunctionARN | [0]" \
            --output text 2>/tmp/cf-function-discovery.err)"; then
            echo "::warning::Skipping CloudFront Function publish (insufficient IAM permissions)."
            cat /tmp/cf-function-discovery.err || true
            exit 0
          fi

          if [ -z "${FUNCTION_ARN}" ] || [ "${FUNCTION_ARN}" = "None" ]; then
            echo "::warning::No viewer-request CloudFront Function associated with distribution ${DISTRIBUTION_ID}; skipping publish."
            exit 0
          fi

          FUNCTION_NAME="${FUNCTION_ARN##*/}"
          FUNCTION_NAME="${FUNCTION_NAME%%:*}"
          echo "Using CloudFront Function: ${FUNCTION_NAME}"

          DEV_ETAG="$(aws cloudfront describe-function \
            --name "${FUNCTION_NAME}" \
            --stage DEVELOPMENT \
            --query "ETag" \
            --output text)"

          aws cloudfront update-function \
            --name "${FUNCTION_NAME}" \
            --if-match "${DEV_ETAG}" \
            --function-config "Comment=Generated from scripts/generate_sitemap_and_redirects.mjs,Runtime=cloudfront-js-1.0" \
            --function-code "fileb://infrastructure/cloudfront/clean-url-redirect.js" >/tmp/cf-update.json

          PUBLISH_ETAG="$(jq -r '.ETag' /tmp/cf-update.json)"

          aws cloudfront publish-function \
            --name "${FUNCTION_NAME}" \
            --if-match "${PUBLISH_ETAG}" >/tmp/cf-publish.json

          LIVE_ETAG="$(jq -r '.ETag' /tmp/cf-publish.json)"
          echo "Published ${FUNCTION_NAME} to LIVE (ETag: ${LIVE_ETAG})"

      - name: Sync website to S3
        run: |
          aws s3 sync website/ "s3://${S3_BUCKET}" \
            --delete \
            --exact-timestamps

      - name: Publish clean URL aliases (no .html)
        run: |
          while IFS= read -r -d '' file; do
            rel="${file#website/}"

            if [ "$rel" = "index.html" ]; then
              continue
            fi

            if [[ "$rel" == */index.html ]]; then
              key="${rel%/index.html}"
            elif [[ "$rel" == *.html ]]; then
              key="${rel%.html}"
            else
              continue
            fi

            if [ -z "$key" ]; then
              continue
            fi

            aws s3 cp "$file" "s3://${S3_BUCKET}/${key}" \
              --content-type "text/html; charset=utf-8"
          done < <(find website -type f -name '*.html' -print0)

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Deployment completed"
          echo "Bucket: ${S3_BUCKET}"
          echo "Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
