name: Deploy Website to AWS

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: sierraseasuite.com
  CLOUDFRONT_DISTRIBUTION_ID: E34R8IP5SI7083

concurrency:
  group: deploy-website-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          missing=0
          for key in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Add them in GitHub repo settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate sitemap and SEO route artifacts
        run: |
          node scripts/generate_sitemap_and_redirects.mjs

      - name: Sync website to S3
        run: |
          aws s3 sync website/ "s3://${S3_BUCKET}" \
            --delete \
            --exact-timestamps

      - name: Publish clean URL aliases (no .html)
        run: |
          while IFS= read -r -d '' file; do
            rel="${file#website/}"

            if [ "$rel" = "index.html" ]; then
              continue
            fi

            if [[ "$rel" == */index.html ]]; then
              key="${rel%/index.html}"
            elif [[ "$rel" == *.html ]]; then
              key="${rel%.html}"
            else
              continue
            fi

            if [ -z "$key" ]; then
              continue
            fi

            aws s3 cp "$file" "s3://${S3_BUCKET}/${key}" \
              --content-type "text/html; charset=utf-8"
          done < <(find website -type f -name '*.html' -print0)

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Deployment completed"
          echo "Bucket: ${S3_BUCKET}"
          echo "Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
