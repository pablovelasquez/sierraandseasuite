<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manual de Huéspedes | Sierra & Sea Suite</title>
  <meta name="description" content="Manual de huéspedes de Sierra & Sea Suite.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --text: #1f2937;
      --muted: #4b5563;
      --card: #ffffff;
      --border: #d1d5db;
      --link: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 4px;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .actions { margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
    a { color: var(--link); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    iframe {
      width: 100%;
      height: calc(100vh - 170px);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
    }
    @media (max-width: 680px) {
      iframe { height: calc(100vh - 210px); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Manual de Huéspedes</h1>
      <p>Si el visor no carga, usa las opciones de abrir o descargar.</p>
      <div class="actions">
        <a href="/files/manual-de-huespedes.pdf" target="_blank" rel="noopener noreferrer">Abrir PDF</a>
        <a href="/files/manual-de-huespedes.pdf" download>Descargar PDF</a>
      </div>
    </section>

    <iframe
      title="Manual de huéspedes"
      src="/files/manual-de-huespedes.pdf#view=FitH"
      loading="eager">
    </iframe>
  </main>
</body>
</html>
